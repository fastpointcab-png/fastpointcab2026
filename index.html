      tailwind.config = {
        darkMode: 'class',

              sans: ['"Plus Jakarta Sans"', 'sans-serif'],
            },

              brand: {
                yellow: '#FF6467',

                slate: '#0f172a',
                cloud: '#F8FAFC',
              },
              yellow: {
                50: '#FFF5F5',

                200: '#FFCCD0',
                300: '#FFA3AA',
                400: '#FF8086',
                500: '#FF7075',
                600: '#FF6467',
                700: '#E64F52',
                800: '#CC3C3F',
                900: '#A32426',
              }
            },
            animation: {
              'fade-in': 'fadeIn 0.5s ease-out',
              'pulse-slow': 'pulse 3s cubic-bezier(0.4, 0, 0.6, 1) infinite',
              'vertical-scroll': 'verticalScroll 60s linear infinite',
              'vertical-scroll-reverse': 'verticalScrollReverse 60s linear infinite',
              'magnetic-float': 'magneticFloat 6s ease-in-out infinite',
              'radar-signal': 'radarSignal 3s cubic-bezier(0, 0, 0.2, 1) infinite',
              'rhythmic-vibrate': 'rhythmicVibrate 2.5s ease-in-out infinite',
              'glow-flow': 'glowFlow 4s ease-in-out infinite',
              'ring-vibrate': 'ringVibrate 3s ease-in-out infinite',
              'side-peek': 'sidePeek 4s ease-in-out infinite',
              'shimmer-x': 'shimmerX 2s infinite',
            },
            keyframes: {
              fadeIn: {
                '0%': { opacity: '0' },
                '100%': { opacity: '1' },
              },
              verticalScroll: {
                '0%': { transform: 'translateY(0)' },
                '100%': { transform: 'translateY(-50%)' },
              },
              verticalScrollReverse: {
                '0%': { transform: 'translateY(-50%)' },
                '100%': { transform: 'translateY(0)' },
              },
              magneticFloat: {
                '0%, 100%': { transform: 'translate(0, 0) rotate(0deg)' },
                '33%': { transform: 'translate(5px, -15px) rotate(2deg)' },
                '66%': { transform: 'translate(-5px, -10px) rotate(-2deg)' },
              },
              radarSignal: {
                '0%': { transform: 'scale(1)', opacity: '0.5' },
                '100%': { transform: 'scale(2.5)', opacity: '0' },
              },
              rhythmicVibrate: {
                '0%, 15%, 100%': { transform: 'rotate(0) scale(1)' },
                '2%': { transform: 'rotate(-8deg) scale(1.1)' },
                '4%': { transform: 'rotate(8deg) scale(1.1)' },
                '6%': { transform: 'rotate(-8deg) scale(1.1)' },
                '8%': { transform: 'rotate(8deg) scale(1.1)' },
                '10%': { transform: 'rotate(0) scale(1)' },
              },
              glowFlow: {
                '0%, 100%': { boxShadow: '0 0 10px rgba(253, 184, 19, 0.3)', filter: 'brightness(1)' },
                '50%': { boxShadow: '0 0 30px rgba(253, 184, 19, 0.6)', filter: 'brightness(1.1)' },
              },
              ringVibrate: {
                '0%, 70%, 100%': { transform: 'rotate(0deg) scale(1)' },
                '72%, 76%, 80%, 84%, 88%': { transform: 'rotate(-12deg) scale(1.05)' },
                '74%, 78%, 82%, 86%, 90%': { transform: 'rotate(12deg) scale(1.05)' },
                '92%': { transform: 'rotate(0deg) scale(1.1)' }
              },
              sidePeek: {
                '0%, 100%': { transform: 'translateX(60%)' },
                '40%, 60%': { transform: 'translateX(0%)' }
              },
              shimmerX: {
                '0%': { transform: 'translateX(-100%)' },
                '100%': { transform: 'translateX(100%)' }
              }
            }
          }
        }
      }
    </script>

<style>
  /* Prevent text selection and modern visual "theft" */
  body {
    background-color: #F8FAFC;
    font-family: 'Plus Jakarta Sans', sans-serif;
    -webkit-font-smoothing: antialiased;
    -webkit-user-select: none;
    -moz-user-select: none;
    -ms-user-select: none;
    user-select: none;
    -webkit-touch-callout: none;
  }
  
  /* Allow selection only in inputs */
  input, textarea {
    -webkit-user-select: text;
    -moz-user-select: text;
    -ms-user-select: text;
    user-select: text;
  }

  /* Ensure main content doesn't get hidden by the tab bar */
  main {
    padding-bottom: 5rem;
  }
  @media (min-width: 768px) {
    main {
      padding-bottom: 0;
    }
  }

  /* When map is active on mobile, hide surrounding layout, lock scrolling and optimize view */
  @media (max-width: 767px) {
    html.map-is-active {
      overflow: hidden !important;
      position: fixed !important;
      width: 100% !important;
      height: 100% !important;
    }
    html.map-is-active body {
      overflow: hidden !important;
      position: fixed !important;
      width: 100% !important;
      height: 100% !important;
    }
    html.map-is-active nav,
    html.map-is-active footer,
    html.map-is-active .md\:hidden.fixed.bottom-0,
    html.map-is-active a[href^="tel:"],
    html.map-is-active div[class*="ChatWidget"],

</style>

<script>
  // Disable console logs in production/shared preview
  if (window.location.hostname !== 'localhost' && !window.location.hostname.includes('ais-dev')) {
    (function () {
      var noOp = function () {};
      window.console = {
        log: noOp,
        warn: noOp,
        error: noOp,
        info: noOp,
        debug: noOp
      };
    })();
  }

  // Prevent right-click context menu
  document.addEventListener('contextmenu', function (e) {
    e.preventDefault();
  }, false);

  // Prevent common devtools shortcuts
  document.onkeydown = function (e) {
    if (e.keyCode == 123) { // F12
      return false;
    }
    if (e.ctrlKey && e.shiftKey && e.keyCode == 'I'.charCodeAt(0)) { // Ctrl+Shift+I
      return false;
    }
    if (e.ctrlKey && e.shiftKey && e.keyCode == 'C'.charCodeAt(0)) { // Ctrl+Shift+C
      return false;
    }
    if (e.ctrlKey && e.shiftKey && e.keyCode == 'J'.charCodeAt(0)) { // Ctrl+Shift+J
      return false;
    }
    if (e.ctrlKey && e.keyCode == 'U'.charCodeAt(0)) { // Ctrl+U (View Source)
      return false;
    }
  };
</script>
